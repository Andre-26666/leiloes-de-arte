name: Garimpo Diário

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 horário de Brasília (09:00 UTC)
    - cron: '0 21 * * *'  # 18:00 horário de Brasília (21:00 UTC)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  garimpo:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt') }}-v2
          restore-keys: pip-

      - name: Cache modelo CLIP (HuggingFace)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-base-patch32-v1

      - name: Instala dependências
        run: |
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por tesseract-ocr-eng -q
          pip install --no-cache-dir requests beautifulsoup4 lxml openpyxl Pillow imagehash pandas pytesseract numpy
          pip install --no-cache-dir torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir transformers
          python -c "from bs4 import BeautifulSoup; BeautifulSoup('<a>', 'lxml'); print('lxml OK')"
          python -c "import pytesseract; print('pytesseract OK')"
          python -c "import torch; print('torch', torch.__version__)"
          python -c "from transformers import CLIPModel; print('transformers CLIP OK')"

      - name: Arquiva lotes com data passada
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python arquivar_lotes.py
        continue-on-error: true

      - name: Roda garimpo LeiloesBR
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python catalogo_leiloesbr.py
        continue-on-error: true

      - name: Roda garimpo Bolsa de Arte
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python catalogo_bolsadearte.py
        continue-on-error: true

      - name: Roda garimpo CDA
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python catalogo_cda.py
        continue-on-error: true

      - name: Roda garimpo Tableau
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python catalogo_tableau.py
        continue-on-error: true

      - name: Roda garimpo CCF Galeria
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python catalogo_ccf.py
        continue-on-error: true

      - name: Atualiza índice visual (phash)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python build_visual_index.py --threads 4
        continue-on-error: true

      - name: Atualiza índice CLIP (até 400 obras novas por execução)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python build_clip_index.py --max 400 --threads 4
        continue-on-error: true

      - name: Pré-calcula Garimpo Visual (phash + CLIP)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python garimpo_visual_precompute.py --threads 6
        continue-on-error: true

      - name: Salva DBs atualizados no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leiloesbr_db.json bolsadearte_db.json cda_db.json tableau_db.json ccf_db.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: atualiza DBs locais [skip ci]"
          git push || true
        continue-on-error: true
